[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.28" 
optimizer = true
optimizer_runs = 0
evm_version = "cancun" 
gas_reports = ["*"]
bytecode_hash = "none"
fs_permissions = [{ access = "read-write", path = "./" }]
extra_output = ["storageLayout"]
ffi = true
dynamic_test_linking = true
# The Aave v4 gateway tests need via_ir (Hub/Spoke instances) + the aave-v4 dependency. Keep them out of
# the default profile so the default build/bytecode-verification settings are unchanged; run them under
# FOUNDRY_PROFILE=aave (see [profile.aave] below).
skip = ["test/gateway/**"]

# Profile for the Aave v4 gateway integration tests: compiles everything (our repo + aave-v4) with via_ir
# so the Hub/Spoke instances build, and un-skips the gateway tests. Run: FOUNDRY_PROFILE=aave forge test.
[profile.aave]
via_ir = true
skip = []
# LiquidationLogic is linked via the `libraries` entry below (compile-time), so forge's runtime library
# auto-linking is unneeded here and would noisily re-resolve aave-v4's `src/`-rooted imports.
dynamic_test_linking = false
# Aave's SpokeInstance links the external LiquidationLogic library. forge's dynamic linker can't
# auto-deploy a library that lives under lib/, so link it to a fixed address; AaveV4Fixture etches the
# library's runtime code there before deploying the spoke.
libraries = ["src/spoke/libraries/LiquidationLogic.sol:LiquidationLogic:0x0000000000000000000000000000000000000A01"]

# Modest bounds: each handler call drives real Aave ops on the fork, so keep the campaign small.
[profile.aave.invariant]
runs = 12
depth = 10
fail_on_revert = false

[fuzz]
runs = 10000

[rpc_endpoints]
mainnet = "${MAINNET_RPC}"
scroll = "${SCROLL_RPC}"
base = "${BASE_RPC}"
optimism = "${OPTIMISM_RPC}"
polygon = "${POLYGON_RPC}"
linea = "${LINEA_RPC}"
sonic = "${SONIC_RPC}"
avalanche = "${AVALANCHE_RPC}"
mantle = "${MANTLE_RPC}"
plasma = "${PLASMA_RPC}"
tempo = "${TEMPO_RPC}"

[etherscan]
mainnet = { key = "${ETHERSCAN_KEY}" }
scroll = { key = "${ETHERSCAN_KEY}" }
base = { key = "${ETHERSCAN_KEY}" }
optimism = { key = "${ETHERSCAN_KEY}" }
hyperevm  = { key = "${ETHERSCAN_KEY}", chain = 999 }
polygon = { key = "${ETHERSCAN_KEY}" }
linea = { key = "${ETHERSCAN_KEY}" }
sonic = { key = "${ETHERSCAN_KEY}" }
avalanche = { key = "${SNOWTRACE_KEY}", chain = 43114, url = "https://api.snowtrace.io/api" }
mantle = { key = "${ETHERSCAN_KEY}" }
plasma = { key = "${ETHERSCAN_KEY}", chain = 9745, url = "https://api.etherscan.io/v2/api?chainid=9745" }
tempo = { key = "${ETHERSCAN_KEY}", chain = 4217, url = "https://api.etherscan.io/v2/api?chainid=4217" }


[fmt]
line_length = 500
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true
sort_imports = true

[lint]
lint_on_build = false
